<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatAI - Email Assistant</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, iframe {
            width: 100%; height: 100%;
            border: 0;
            overflow: hidden;
        }
        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf9f8;
        }
        #app-frame {
            display: block;
            width: 100%;
            height: 100%;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(0,120,212,0.2);
            border-top-color: #0078d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { font-size: 14px; color: #605e5c; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="status">Loading...</div>
    </div>
    <iframe id="app-frame" style="display:none;"></iframe>

    <script>
        const APP_BASE_URL = window.location.origin;

        function storeEmailContext() {
            // Extract email context and store in sessionStorage
            if (typeof Office !== 'undefined' && Office.context?.mailbox?.item) {
                const item = Office.context.mailbox.item;
                const context = {
                    itemType: item.itemType,
                    subject: typeof item.subject === 'string' ? item.subject : '',
                    from: item.from?.emailAddress || item.from?.displayName || '',
                    to: item.to?.map(r => r.emailAddress || r.displayName || '').filter(Boolean) || [],
                    cc: item.cc?.map(r => r.emailAddress || r.displayName || '').filter(Boolean) || [],
                    bcc: item.bcc?.map(r => r.emailAddress || r.displayName || '').filter(Boolean) || [],
                    body: '',
                };
                
                try {
                    sessionStorage.setItem('outlook_email_context', JSON.stringify(context));
                } catch(e) {
                    console.warn('Failed to store email context:', e);
                }
            }
        }

        function loadApp() {
            storeEmailContext();
            
            const frame = document.getElementById('app-frame');
            const loading = document.getElementById('loading');
            
            frame.src = APP_BASE_URL + '/outlook';
            frame.style.display = 'block';
            loading.style.display = 'none';
        }

        // Initialize when Office.js is ready
        if (typeof Office === 'undefined') {
            setTimeout(loadApp, 300);
        } else {
            Office.onReady(function() {
                loadApp();
            });
        }
    </script>
</body>
</html>
