<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatUI - Email Assistant</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
        }
        
        #loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        #app-frame {
            width: 100%;
            height: 100vh;
            border: none;
            background: white;
        }
        
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }
        
        .error-icon {
            font-size: 48px;
            color: #dc3545;
            margin-bottom: 16px;
        }
        
        .error-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        
        .error-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .retry-button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .retry-button:hover {
            background: #106ebe;
        }
    </style>
</head>

<body>
    <!-- Loading State -->
    <div id="loading-container">
        <div class="spinner"></div>
        <div class="logo">ChatUI</div>
        <div class="subtitle">Loading Email Assistant...</div>
    </div>
    
    <!-- Error State (hidden by default) -->
    <div id="error-container" class="error-container" style="display: none;">
        <div class="error-icon">!</div>
        <div class="error-title">Connection Error</div>
        <div class="error-message">Unable to load the email assistant. Please check your connection and try again.</div>
        <button class="retry-button" onclick="loadApp()">Retry</button>
    </div>
    
    <!-- Main App Frame (hidden initially) -->
    <iframe id="app-frame" style="display: none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

    <script>
        // Office.js initialization
        Office.onReady((info) => {
            if (info.host === Office.HostType.Outlook) {
                console.log('Office.js ready, loading ChatUI...');
                loadApp();
            }
        });
        
        // Fallback if Office.js doesn't fire
        setTimeout(() => {
            if (document.getElementById('loading-container').style.display !== 'none') {
                console.log('Office.js timeout, loading ChatUI anyway...');
                loadApp();
            }
        }, 2000);
        
        function loadApp() {
            const frame = document.getElementById('app-frame');
            const loading = document.getElementById('loading-container');
            const error = document.getElementById('error-container');
            
            // Get the base URL from current location
            const baseUrl = window.location.origin;
            const outlookUrl = `${baseUrl}/outlook`;
            
            // Set iframe source with timestamp to prevent caching
            frame.src = `${outlookUrl}?t=${Date.now()}&outlook=true`;
            
            // Show iframe, hide loading
            frame.style.display = 'block';
            loading.style.display = 'none';
            
            // Handle iframe load events
            frame.onload = function() {
                console.log('ChatUI loaded successfully');
                
                // Setup communication with iframe
                setupIframeCommunication();
            };
            
            frame.onerror = function() {
                console.error('Failed to load ChatUI');
                showError();
            };
            
            // Timeout error handling
            setTimeout(() => {
                try {
                    const iframeDoc = frame.contentDocument || frame.contentWindow.document;
                    if (!iframeDoc || iframeDoc.title.includes('Error')) {
                        showError();
                    }
                } catch (e) {
                    // Cross-origin error is expected, check if iframe is responsive
                    console.log('Iframe communication check');
                }
            }, 10000);
        }
        
        function showError() {
            document.getElementById('loading-container').style.display = 'none';
            document.getElementById('app-frame').style.display = 'none';
            document.getElementById('error-container').style.display = 'flex';
        }
        
        function setupIframeCommunication() {
            const frame = document.getElementById('app-frame');
            
            // Listen for messages from iframe
            window.addEventListener('message', function(event) {
                // Verify origin for security
                if (event.origin !== window.location.origin) return;
                
                const { type, data } = event.data;
                
                switch (type) {
                    case 'OUTLOOK_GET_EMAIL_CONTEXT':
                        handleGetEmailContext(event.source);
                        break;
                    case 'OUTLOOK_INSERT_TEMPLATE':
                        handleInsertTemplate(data);
                        break;
                    case 'OUTLOOK_NEW_EMAIL':
                        handleNewEmail(data);
                        break;
                    case 'OUTLOOK_READY':
                        console.log('ChatUI ready for Outlook integration');
                        break;
                }
            });
            
            // Send initial Outlook context to iframe
            setTimeout(() => {
                sendEmailContext();
            }, 1000);
        }
        
        function handleGetEmailContext(targetWindow) {
            const context = getEmailContext();
            targetWindow.postMessage({
                type: 'OUTLOOK_EMAIL_CONTEXT',
                data: context
            }, window.location.origin);
        }
        
        function handleInsertTemplate(templateData) {
            try {
                Office.context.mailbox.item.body.setSelectedDataAsync(
                    templateData.content,
                    { coercionType: Office.CoercionType.Html },
                    function(asyncResult) {
                        if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                            console.error('Failed to insert template:', asyncResult.error);
                            showNotification('Failed to insert template', 'error');
                        } else {
                            showNotification('Template inserted successfully', 'success');
                        }
                    }
                );
            } catch (error) {
                console.error('Error inserting template:', error);
                showNotification('Error inserting template', 'error');
            }
        }
        
        function handleNewEmail(templateData) {
            try {
                Office.context.mailbox.displayNewMessageForm({
                    toRecipients: templateData.to || [],
                    subject: templateData.subject || '',
                    htmlBody: templateData.content || ''
                });
            } catch (error) {
                console.error('Error creating new email:', error);
                showNotification('Error creating new email', 'error');
            }
        }
        
        function getEmailContext() {
            try {
                const item = Office.context.mailbox.item;
                if (!item) return null;
                
                const context = {
                    subject: '',
                    from: '',
                    to: [],
                    body: '',
                    itemType: item.itemType || 'message'
                };
                
                // Get subject (handle both read and compose modes)
                if (typeof item.subject === 'string') {
                    context.subject = item.subject;
                } else if (item.subject && item.subject.getAsync) {
                    item.subject.getAsync(function(result) {
                        if (result.status === Office.AsyncResultStatus.Succeeded) {
                            context.subject = result.value;
                        }
                    });
                }
                
                // Get sender info
                if (item.from) {
                    context.from = item.from.emailAddress || item.from.displayName || '';
                }
                
                // Get recipients
                if (item.to && item.to.length > 0) {
                    context.to = item.to.map(recipient => 
                        recipient.emailAddress || recipient.displayName || ''
                    );
                }
                
                // Get body (async operation)
                if (item.body && item.body.getAsync) {
                    item.body.getAsync('text', function(result) {
                        if (result.status === Office.AsyncResultStatus.Succeeded) {
                            context.body = result.value;
                        }
                    });
                }
                
                return context;
            } catch (error) {
                console.error('Error getting email context:', error);
                return null;
            }
        }
        
        function sendEmailContext() {
            const frame = document.getElementById('app-frame');
            const context = getEmailContext();
            
            if (frame.contentWindow && context) {
                frame.contentWindow.postMessage({
                    type: 'OUTLOOK_EMAIL_CONTEXT_UPDATE',
                    data: context
                }, window.location.origin);
            }
        }
        
        function showNotification(message, type = 'info') {
            // Simple notification - you can enhance this
            console.log(`[${type.toUpperCase()}] ${message}`);
            
            // Send notification to iframe
            const frame = document.getElementById('app-frame');
            if (frame.contentWindow) {
                frame.contentWindow.postMessage({
                    type: 'NOTIFICATION',
                    data: { message, type }
                }, window.location.origin);
            }
        }
        
        // Listen for Office context changes (for pinnable task pane)
        if (Office.context && Office.context.mailbox) {
            // Register ItemChanged event handler for pinnable task pane
            Office.context.mailbox.addHandlerAsync(
                Office.EventType.ItemChanged,
                itemChanged,
                function(asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Succeeded) {
                        console.log('ItemChanged event handler registered successfully');
                    } else {
                        console.error('Failed to register ItemChanged event handler:', asyncResult.error);
                    }
                }
            );
        }
        
        // Event handler for when the selected message changes (pinnable task pane)
        function itemChanged(eventArgs) {
            console.log('Email item changed, updating context...');
            
            // Update the email context in the iframe
            sendEmailContext();
            
            // Optionally notify the iframe that the item has changed
            const frame = document.getElementById('app-frame');
            if (frame && frame.contentWindow) {
                frame.contentWindow.postMessage({
                    type: 'OUTLOOK_ITEM_CHANGED',
                    data: { timestamp: new Date().toISOString() }
                }, window.location.origin);
            }
        }
    </script>
</body>
</html>
